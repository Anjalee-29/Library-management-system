<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">📚</span>
      <span class="logo-text">LibraryMS</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <span class="nav-icon">🏠</span><span>Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-page="books">
        <span class="nav-icon">📖</span><span>Books</span>
      </a>
      <a href="#" class="nav-item" data-page="members">
        <span class="nav-icon">👥</span><span>Members</span>
      </a>
      <a href="#" class="nav-item" data-page="transactions">
        <span class="nav-icon">🔄</span><span>Transactions</span>
      </a>
      <a href="#" class="nav-item" data-page="overdue">
        <span class="nav-icon">⚠️</span><span>Overdue</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
    </header>

    <!-- DASHBOARD PAGE -->
    <section class="page active" id="page-dashboard">
      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-icon">📚</div>
          <div class="stat-info"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Books</div></div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">✅</div>
          <div class="stat-info"><div class="stat-num" id="stat-available">—</div><div class="stat-label">Available</div></div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon">👥</div>
          <div class="stat-info"><div class="stat-num" id="stat-members">—</div><div class="stat-label">Active Members</div></div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon">🔄</div>
          <div class="stat-info"><div class="stat-num" id="stat-borrowed">—</div><div class="stat-label">Borrowed</div></div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon">⚠️</div>
          <div class="stat-info"><div class="stat-num" id="stat-overdue">—</div><div class="stat-label">Overdue</div></div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card">
          <div class="card-header"><h2>Recent Transactions</h2></div>
          <div id="recent-transactions" class="table-wrap"></div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Quick Actions</h2></div>
          <div class="quick-actions">
            <button class="btn btn-primary" onclick="showPage('books'); document.getElementById('addBookBtn').click()">+ Add Book</button>
            <button class="btn btn-secondary" onclick="showPage('members'); document.getElementById('addMemberBtn').click()">+ Add Member</button>
            <button class="btn btn-success" onclick="showPage('transactions'); document.getElementById('borrowBtn').click()">📤 Borrow Book</button>
            <button class="btn btn-warning" onclick="showPage('transactions')">📥 Return Book</button>
          </div>
        </div>
      </div>
    </section>

    <!-- BOOKS PAGE -->
    <section class="page" id="page-books">
      <div class="page-actions">
        <div class="search-bar">
          <input type="text" id="bookSearch" placeholder="Search by title, author, ISBN…" oninput="searchBooks()" />
          <select id="genreFilter" onchange="searchBooks()">
            <option value="">All Genres</option>
          </select>
        </div>
        <button class="btn btn-primary" id="addBookBtn" onclick="openBookModal()">+ Add Book</button>
      </div>
      <div class="card">
        <div id="books-table" class="table-wrap"></div>
      </div>
    </section>

    <!-- MEMBERS PAGE -->
    <section class="page" id="page-members">
      <div class="page-actions">
        <input type="text" id="memberSearch" placeholder="Search by name, email, ID…" oninput="searchMembers()" class="search-input" />
        <button class="btn btn-primary" id="addMemberBtn" onclick="openMemberModal()">+ Add Member</button>
      </div>
      <div class="card">
        <div id="members-table" class="table-wrap"></div>
      </div>
    </section>

    <!-- TRANSACTIONS PAGE -->
    <section class="page" id="page-transactions">
      <div class="page-actions">
        <div class="filter-tabs">
          <button class="tab-btn active" onclick="filterTransactions('')">All</button>
          <button class="tab-btn" onclick="filterTransactions('borrowed')">Borrowed</button>
          <button class="tab-btn" onclick="filterTransactions('returned')">Returned</button>
        </div>
        <button class="btn btn-primary" id="borrowBtn" onclick="openBorrowModal()">📤 Borrow Book</button>
      </div>
      <div class="card">
        <div id="transactions-table" class="table-wrap"></div>
      </div>
    </section>

    <!-- OVERDUE PAGE -->
    <section class="page" id="page-overdue">
      <div class="page-actions">
        <h2 class="section-subtitle">Books past their due date</h2>
      </div>
      <div class="card">
        <div id="overdue-table" class="table-wrap"></div>
      </div>
    </section>
  </main>

  <!-- MODALS -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>

  <!-- Book Modal -->
  <div class="modal" id="bookModal">
    <div class="modal-header">
      <h2 id="bookModalTitle">Add Book</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="bookId" />
      <div class="form-row">
        <div class="form-group">
          <label>ISBN *</label>
          <input type="text" id="bookIsbn" placeholder="e.g. 978-0-7432-7356-5" />
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="bookYear" placeholder="e.g. 2023" />
        </div>
      </div>
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="bookTitle" placeholder="Book title" />
      </div>
      <div class="form-group">
        <label>Author *</label>
        <input type="text" id="bookAuthor" placeholder="Author name" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Genre</label>
          <input type="text" id="bookGenre" placeholder="e.g. Fiction" />
        </div>
        <div class="form-group">
          <label>Publisher</label>
          <input type="text" id="bookPublisher" placeholder="Publisher name" />
        </div>
      </div>
      <div class="form-group">
        <label>Total Copies</label>
        <input type="number" id="bookCopies" value="1" min="1" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="bookDesc" placeholder="Short description…" rows="3"></textarea>
      </div>
      <div id="bookError" class="error-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBook()">Save Book</button>
    </div>
  </div>

  <!-- Member Modal -->
  <div class="modal" id="memberModal">
    <div class="modal-header">
      <h2 id="memberModalTitle">Add Member</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="memberId" />
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="memberName" placeholder="Full name" />
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="memberEmail" placeholder="email@example.com" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="memberPhone" placeholder="Phone number" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="memberStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="memberAddress" placeholder="Address" />
      </div>
      <div id="memberError" class="error-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMember()">Save Member</button>
    </div>
  </div>

  <!-- Borrow Modal -->
  <div class="modal" id="borrowModal">
    <div class="modal-header">
      <h2>Borrow a Book</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Select Book *</label>
        <select id="borrowBookId"><option value="">Choose a book…</option></select>
      </div>
      <div class="form-group">
        <label>Select Member *</label>
        <select id="borrowMemberId"><option value="">Choose a member…</option></select>
      </div>
      <div class="form-group">
        <label>Loan Duration (days)</label>
        <input type="number" id="borrowDays" value="14" min="1" max="60" />
      </div>
      <div id="borrowError" class="error-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="borrowBook()">Confirm Borrow</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
